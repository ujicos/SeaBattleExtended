name = "seabattle-extended"
main = "worker/signaling.ts"
compatibility_date = "2026-07-07"

[durable_objects]
bindings = [
  { name = "ROOMS", class_name = "SignalingRoom" },
  { name = "LOBBIES", class_name = "LobbyRegistry" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalingRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["LobbyRegistry"]

[[d1_databases]]
binding = "DB_Leaderboard"
database_name = "seabattleextended_leaderboard"
database_id = "91f0e247-d4be-4cd8-baea-b06033aaf9fd"
